permissions:
  contents: write

name: populate-apk-data

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Space-separated archive.org item URLs to add then process"
        required: false
        default: ""
  schedule:
    - cron: '0 3 * * 1' # weekly, adjust as needed

jobs:
  populate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install remotezip

      - name: Ensure data dir
        run: mkdir -p data

      - name: Add archive.org URLs from input (if any)
        run: |
          if [ -n "${{ github.event.inputs.urls }}" ]; then
            echo "Adding URLs: ${{ github.event.inputs.urls }}"
            for u in ${{ github.event.inputs.urls }}; do
              python apk_archive.py add "$u" || echo "add failed for $u"
            done
          else
            echo "No URLs provided as input."
          fi

      - name: Add URLs from archive_urls.txt (if present)
        run: |
          if [ -f archive_urls.txt ]; then
            echo "Found archive_urls.txt. Adding URLs from file..."
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              python apk_archive.py add "$line" || echo "add failed for $line"
            done < archive_urls.txt
          else
            echo "archive_urls.txt not found; skipping file-based adds."
          fi

      - name: Process pending APKs
        run: python apk_archive.py run

      - name: Show data folder contents
        run: ls -la data || true

      - name: Commit and push updated data/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add data || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update data/ from workflow run (${GITHUB_RUN_ID})"
            git push
          fi
