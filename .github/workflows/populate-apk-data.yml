permissions:
  contents: write

name: populate-apk-data

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Space-separated archive.org item URLs to add then process"
        required: false
        default: ""
  schedule:
    - cron: '0 3 * * 1'

jobs:
  populate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install remotezip axmlparserpy Pillow

      - name: Ensure data dir
        run: mkdir -p data

      - name: Add archive.org URLs from input (if any)
        run: |
          if [ -n "${{ github.event.inputs.urls }}" ]; then
            echo "Adding URLs: ${{ github.event.inputs.urls }}"
            # Split on whitespace (space/newline/tab) into an array, then iterate safely
            IFS=$' \n\t' read -r -a arr <<< "${{ github.event.inputs.urls }}"
            for u in "${arr[@]}"; do
              python apk_archive.py add "$u" || echo "add failed for $u"
            done
          else
            echo "No URLs provided as input."
          fi

      - name: Add URLs from archive_urls.txt (if present)
        run: |
          if [ -f archive_urls.txt ]; then
            echo "Found archive_urls.txt. Adding URLs from file..."
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              python apk_archive.py add "$line" || echo "add failed for $line"
            done < archive_urls.txt
          else
            echo "archive_urls.txt not found; skipping file-based adds."
          fi

      - name: Process pending APKs
        run: python apk_archive.py run

      - name: Export JSON for site
        run: python apk_archive.py export json

      - name: Debug: list data files
        run: |
          echo "------ data/ contents ------"
          find data -maxdepth 3 -type f -exec ls -l {} \; || true
          echo "------ apk.json head ------"
          head -n 5 data/apk.json || true

      - name: Commit exported JSON and icons
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          # Add exported JSON and any PNG/JPG icons (recursively). Avoid committing the DB.
          git add data/apk.json data/urls.json || true
          find data -type f \( -iname '*.jpg' -o -iname '*.png' \) -exec git add {} + || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update exported apk JSON and icons (${GITHUB_RUN_ID})"
            git push
          fi
